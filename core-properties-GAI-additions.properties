# ============================================================================
# GAI Feed — append to scef/src/main/resources/META-INF/core.properties
# Format matches existing entries: ENV.*.*.key=value
# No DB properties needed — GAIDatabaseQueryService reuses @Named("scef-ods")
# ============================================================================

# Master switch
LOCAL.*.*.SCEF.gai.feed.job.open=true
SIT.*.*.SCEF.gai.feed.job.open=true
UAT.*.*.SCEF.gai.feed.job.open=true
PROD.*.*.SCEF.gai.feed.job.open=true

# Output staging directory (cobDate subfolder created automatically per run)
LOCAL.*.*.SCEF.gai.feed.output.dir=C:/apps/scef/gai/staging
SIT.*.*.SCEF.gai.feed.output.dir=/opt/scef/gai/staging
UAT.*.*.SCEF.gai.feed.output.dir=/opt/scef/gai/staging
PROD.*.*.SCEF.gai.feed.output.dir=/opt/scef/gai/staging

# SFTP switch
LOCAL.*.*.SCEF.gai.feed.sftp.enabled=false
SIT.*.*.SCEF.gai.feed.sftp.enabled=false
UAT.*.*.SCEF.gai.feed.sftp.enabled=true
PROD.*.*.SCEF.gai.feed.sftp.enabled=true

# SFTP hosts
LOCAL.*.*.SCEF.gai.feed.sftp.host=gfolygwdev.wlb3.nam.nsroot.net
SIT.*.*.SCEF.gai.feed.sftp.host=gfolygwdev.wlb3.nam.nsroot.net
UAT.*.*.SCEF.gai.feed.sftp.host=gfolygwuat.wlb3.nam.nsroot.net
PROD.*.*.SCEF.gai.feed.sftp.host=gfolygwprod.wlb3.nam.nsroot.net

# SFTP functional IDs
LOCAL.*.*.SCEF.gai.feed.sftp.user=opiemdv
SIT.*.*.SCEF.gai.feed.sftp.user=opiemdv
UAT.*.*.SCEF.gai.feed.sftp.user=opiemua
PROD.*.*.SCEF.gai.feed.sftp.user=opiempr

# SFTP PEM key paths
LOCAL.*.*.SCEF.gai.feed.sftp.key.path=C:/apps/scef/keys/opiemdv@clmwiemap1d.pem
SIT.*.*.SCEF.gai.feed.sftp.key.path=/opt/scef/keys/opiemdv@clmwiemap1d.pem
UAT.*.*.SCEF.gai.feed.sftp.key.path=/opt/scef/keys/opiemua@clmwiemap6u.pem
PROD.*.*.SCEF.gai.feed.sftp.key.path=/opt/scef/keys/opiempr@clmwiemap7p.pem

# SFTP remote target path (same for all environments)
*.*.*.SCEF.gai.feed.sftp.remote.path=/gfolysftp/gfolyrsk/incoming/citirisk

# SFTP tuning (defaults shown — only override if needed)
*.*.*.SCEF.gai.feed.sftp.port=22
*.*.*.SCEF.gai.feed.sftp.timeout.ms=30000
*.*.*.SCEF.gai.feed.sftp.retries=2
*.*.*.SCEF.gai.feed.sftp.strict.host.key.checking=false

# File naming constants (same across all environments)
*.*.*.SCEF.gai.feed.csi=161534
*.*.*.SCEF.gai.feed.org=CRC

# Null/empty field default written when a column value is null
*.*.*.SCEF.gai.feed.null.default=

# ── Email alerts ──────────────────────────────────────────────────────────────
# Master switch — set false to silence all GAI email alerts
*.*.*.SCEF.gai.feed.alert.enabled=true

# Comma-separated recipient list
LOCAL.*.*.SCEF.gai.feed.alert.recipients=
SIT.*.*.SCEF.gai.feed.alert.recipients=scef-dev-team@citi.com
UAT.*.*.SCEF.gai.feed.alert.recipients=scef-dev-team@citi.com,scef-uat-support@citi.com
PROD.*.*.SCEF.gai.feed.alert.recipients=scef-prod-support@citi.com,scef-manager@citi.com

*.*.*.SCEF.gai.feed.alert.from=scef-noreply@citi.com
*.*.*.SCEF.gai.feed.alert.subject.prefix=[SCEF-GAI]
